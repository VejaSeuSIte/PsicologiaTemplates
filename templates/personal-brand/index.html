<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Template Acolhedor &amp; Humano · Em desenvolvimento</title>
<meta name="theme-color" content="#547749" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#fbfaf6;color:#1a1814;min-height:100vh;display:grid;place-items:center;padding:32px;line-height:1.6}
  .wrap{max-width:560px;text-align:center}
  .eye{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#547749;font-weight:600;margin-bottom:20px}
  h1{font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(36px,5vw,52px);line-height:1.08;letter-spacing:-.02em;margin-bottom:20px}
  h1 em{font-style:italic;color:#547749}
  p{color:#5a5a50;font-size:17px;margin-bottom:28px}
  a{display:inline-flex;align-items:center;gap:8px;padding:14px 26px;background:#1a1814;color:#fbfaf6;border-radius:100px;font-weight:600;font-size:14px;text-decoration:none;transition:background .2s}
  a:hover{background:#547749}
  .mono{font-family:monospace;font-size:13px;color:#868578;letter-spacing:.05em;margin-top:32px;padding-top:24px;border-top:1px solid #dbe2d4}
</style>
</head>
<body>
<div class="wrap">
  <div class="eye">Em desenvolvimento</div>
  <h1>Acolhedor &amp; <em>humano</em></h1>
  <p>Template em desenho. Previsto para abril de 2026. Enquanto isso, cada site é feito do zero na conversa inicial.</p>
  <a href="../../">← Voltar para os estilos</a>
  <div class="mono">personal-brand · em breve</div>
</div>
</body>
</html>
